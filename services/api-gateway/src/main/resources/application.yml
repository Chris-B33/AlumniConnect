server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      # Browser → gateway (React/Vite on localhost). Downstream services are server-side;
      # they do not need duplicate CORS for traffic that only goes through the gateway.
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - http://localhost:5173
              - http://localhost:3000
              - http://127.0.0.1:5173
              - http://127.0.0.1:3000
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            # Explicit allowlist (no '*') so preflight matches what the SPA actually sends:
            # JSON bodies + Bearer JWT on API calls.
            allowedHeaders:
              - Authorization
              - Content-Type
              - Accept
            allowCredentials: true
            # Cache successful preflight at the browser (seconds); reduces OPTIONS chatter during dev.
            maxAge: 3600
      routes:
        - id: identity-service
          uri: lb://identity-service
          predicates:
            - Path=/identity/**
          filters:
            - StripPrefix=1
        - id: mentorship-service
          uri: lb://mentorship-service
          predicates:
            - Path=/mentorship/**
          filters:
            - StripPrefix=1
        - id: event-service
          uri: lb://event-service
          predicates:
            - Path=/event/**
          filters:
            - StripPrefix=1

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
