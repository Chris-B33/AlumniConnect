server:
  port: 8082

spring:
  application:
    name: mentorship-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:mentorship;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  flyway:
    table: flyway_schema_history_mentorship
    schemas: mentorship
    default-schema: mentorship
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: mentorship
  config:
    import: ${ALUMNI_CONFIG_IMPORT:configserver:http://localhost:8888}
